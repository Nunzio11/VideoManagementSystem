<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video</title>
    <link rel="icon" href="data:,">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>

<body>

<div class="container mt-5">

    <div class="text-end mb-3">
        <span id="user-greeting" class="fw-bold text-secondary"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h2 id="playlist-title"></h2>
            <p class="text-muted mb-0" id="playlist-author"></p>
            <p class="text-muted" id="playlist-category"></p>
        </div>

        <button
                id="btn-new-video"
                class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#insertVideoModal">
            + Nuovo Video
        </button>
    </div>

    <hr>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
        <tr>
            <th>Titolo</th>
            <th>Durata</th>
            <th>Livello</th>
            <th>Azioni</th>
        </tr>
        </thead>
        <tbody id="video-table">
        </tbody>
    </table>

    <div class="d-flex justify-content-between align-items-center mb-5">
        <a href="index.html" class="btn btn-secondary">
            ← Torna alle Playlist
        </a>
    </div>

    <div id="video-player-container" class="mt-5 d-none mb-5">
        <div class="card shadow-sm">
            <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                <h4 class="m-0" id="player-video-title">Riproduzione Video</h4>
                <button type="button" class="btn-close btn-close-white" onclick="document.getElementById('video-player-container').classList.add('d-none'); document.getElementById('main-video-player').src=''; document.getElementById('player-current-video').innerText='';" aria-label="Close"></button>
            </div>
            <div class="card-body text-center bg-light">
                <h6 id="player-video-details" class="text-muted mb-3"></h6>
                <div class="ratio ratio-16x9 mx-auto mb-2" style="max-width: 750px;">
                    <iframe id="main-video-player" src="" allowfullscreen allow="autoplay"></iframe>
                </div>
                <p class="text-muted small mt-2">In riproduzione: <span id="player-current-video" class="fw-bold text-dark"></span></p>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="insertVideoModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Nuovo Video</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Titolo</label>
                    <input id="video-title" class="form-control" placeholder="Inserisci il titolo del video">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Durata (minuti)</label>
                    <input type="number" id="video-duration" class="form-control" placeholder="Es. 15">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Livello</label>
                    <select id="video-level" class="form-control">
                        <option value="BEGINNER">BEGINNER</option>
                        <option value="INTERMEDIATE">INTERMEDIATE</option>
                        <option value="ADVANCED">ADVANCED</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">URL Video / File Path</label>
                    <input id="video-url" class="form-control" placeholder="Es. https://www.youtube.com/watch?v=...">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
                <button class="btn btn-success" onclick="saveVideo()">Salva</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="updateVideoModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Modifica Video</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Titolo</label>
                    <input id="upd-video-title" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Durata (minuti)</label> <input type="number" id="upd-video-duration" class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Livello</label>
                    <select id="upd-video-level" class="form-control">
                        <option value="BEGINNER">BEGINNER</option>
                        <option value="INTERMEDIATE">INTERMEDIATE</option>
                        <option value="ADVANCED">ADVANCED</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">URL Video / File Path</label>
                    <input id="upd-video-url" class="form-control">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
                <button id="btn-update-video" class="btn btn-warning" onclick="saveVideoUpdate()">Aggiorna</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/playlist-service.js"></script>
<script src="js/video-service.js"></script>
<script src="js/video.js"></script>

</body>
</html>
