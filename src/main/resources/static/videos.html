<!DOCTYPE html>
<html lang="it">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Video</title>
    <link rel="icon" href ="data:,">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-5">

    <div class="text-end mb-3">
        <span id="user-greeting" class="fw-bold text-secondary"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center">

        <div>

            <h2 id="playlist-title"></h2>

            <p class="text-muted mb-0" id="playlist-author"></p>

            <p class="text-muted" id="playlist-category"></p>

        </div>

        <button
                id="btn-new-video"
                class="btn btn-success"
                data-bs-toggle="modal"
                data-bs-target="#insertVideoModal">
            + Nuovo Video
        </button>

    </div>

    <hr>

    <table class="table table-striped table-hover">

        <thead class="table-dark">

        <tr>

            <th>Titolo</th>

            <th>Durata</th>

            <th>Livello</th>

            <th>Azioni</th>

        </tr>

        </thead>

        <tbody id="video-table">

        </tbody>

    </table>

    <a
            href="index.html"
            class="btn btn-secondary">

        ← Torna alle Playlist

    </a>

</div>



<div class="modal fade" id="insertVideoModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Nuovo Video</h5>

                <button
                        class="btn-close"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label>Titolo</label>

                    <input
                            id="video-title"
                            class="form-control">

                </div>

                <div class="mb-3">

                    <label>Durata (minuti)</label>

                    <input
                            type="number"
                            id="video-duration"
                            class="form-control">

                </div>

                <div class="mb-3">

                    <label>Livello</label>

                    <select
                            id="video-level"
                            class="form-control">

                        <option value="BEGINNER">BEGINNER</option>

                        <option value="INTERMEDIATE">INTERMEDIATE</option>

                        <option value="ADVANCED">ADVANCED</option>

                    </select>

                </div>

            </div>

            <div class="modal-footer">

                <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Chiudi

                </button>

                <button
                        class="btn btn-success"
                        onclick="saveVideo()">

                    Salva

                </button>

            </div>

        </div>

    </div>

</div>



<div class="modal fade" id="updateVideoModal">

    <div class="modal-dialog">

        <div class="modal-content">

            <div class="modal-header">

                <h5>Modifica Video</h5>

                <button
                        class="btn-close"
                        data-bs-dismiss="modal">

                </button>

            </div>

            <div class="modal-body">

                <div class="mb-3">

                    <label>Titolo</label>

                    <input
                            id="upd-video-title"
                            class="form-control">

                </div>

                <div class="mb-3">

                    <label>Durata</label>

                    <input
                            type="number"
                            id="upd-video-duration"
                            class="form-control">

                </div>

                <div class="mb-3">

                    <label>Livello</label>

                    <select
                            id="upd-video-level"
                            class="form-control">

                        <option value="BEGINNER">BEGINNER</option>

                        <option value="INTERMEDIATE">INTERMEDIATE</option>

                        <option value="ADVANCED">ADVANCED</option>

                    </select>

                </div>

            </div>

            <div class="modal-footer">

                <button
                        class="btn btn-secondary"
                        data-bs-dismiss="modal">

                    Chiudi

                </button>

                <button
                        id="btn-update-video"
                        class="btn btn-warning"
                        onclick="saveVideoUpdate()">

                    Aggiorna

                </button>

            </div>

        </div>

    </div>

</div>



<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/playlist-service.js"></script>
<script src="js/video-service.js"></script>
<script src="js/video.js"></script>

</body>

</html>
