<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Video Management System</title>
    <link rel="icon" href ="data:,">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="text-end mb-3">
        <span id="user-greeting" class="fw-bold text-secondary"></span>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>🎬 Video Management System</h1>
        <div>
            <button class="btn btn-danger me-2" onclick="logout()">
                Logout
            </button>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#insertModal">
                + Nuova Playlist
            </button>
        </div>
    </div>

    <table id="playlistTable" class="table table-striped table-hover shadow">
        <thead class="table-dark">
        <tr>
            <th>Titolo</th>
            <th>Autore</th>
            <th>Categoria</th>
            <th>Video</th>
            <th>Azioni</th>
        </tr>
        </thead>
        <tbody id="playlist-table">
        </tbody>
    </table>

</div>


<div class="modal fade" id="insertModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Nuova Playlist</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label>Titolo</label>
                    <input id="title" class="form-control">
                </div>
                <div class="mb-3"></div>
                <div class="mb-3">
                    <label>Categoria</label>
                    <input id="category" class="form-control">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Chiudi
                </button>
                <button type="button" class="btn btn-success" onclick="savePlaylist()">
                    Salva
                </button>
            </div>
        </div>
    </div>
</div>


<div class="modal fade" id="updateModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5>Modifica Playlist</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">
                <div class="mb-3">
                    <label>Titolo</label>
                    <input id="upd-title" class="form-control">
                </div>
                <div class="mb-3"></div>
                <div class="mb-3">
                    <label>Categoria</label>
                    <input id="upd-category" class="form-control">
                </div>
            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Chiudi
                </button>
                <button type="button" id="btn-save-update" class="btn btn-warning" onclick="saveUpdate()">
                    Aggiorna
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="js/api.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/playlist-service.js"></script>
<script src="js/playlist.js"></script>

</body>
</html>
